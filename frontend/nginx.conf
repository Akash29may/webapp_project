# Serve the built SPA and reverse-proxy the API to the Django backend so the
# whole app is same-origin (session cookies + CSRF work without CORS). Issue #56.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    # API + media -> Django (service name "backend" from docker-compose)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /django-static/ {
        proxy_pass http://backend:8000/static/;
    }

    # SPA fallback: everything else serves index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
