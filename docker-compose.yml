# SmartExam AI — full stack (board issues #54, #56)
# Django + Gunicorn behind Nginx, PostgreSQL, and the built React SPA.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: smartexam
      POSTGRES_USER: smartexam
      POSTGRES_PASSWORD: smartexam
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartexam"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      SECRET_KEY: change-me-in-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: smartexam
      DB_USER: smartexam
      DB_PASSWORD: smartexam
      DB_HOST: db
      DB_PORT: "5432"
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
