<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartExam AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fbff 0%, #e8f0ff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background: #fff;
        }

        .nav-tabs {
            border-bottom: none;
            background: #f8f9fa;
        }

        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            padding: 15px;
            font-weight: 600;
            text-align: center;
            width: 100%;
        }

        .nav-tabs .nav-link.active {
            background: #fff;
            color: #0d6efd;
            border-bottom: 3px solid #0d6efd;
        }

        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .btn-login {
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .password-toggle {
            cursor: pointer;
            color: #6c757d;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0d6efd;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <a href="/" class="brand-logo"><i class="fas fa-brain me-2"></i>SmartExam AI</a>
                </div>

                <div class="card login-card">
                    <ul class="nav nav-tabs d-flex" id="loginTabs" role="tablist">
                        <li class="nav-item flex-fill" role="presentation">
                            <button class="nav-link active" id="student-tab" data-bs-toggle="tab"
                                data-bs-target="#student" type="button" role="tab">
                                <i class="fas fa-user-graduate me-2"></i>Student
                            </button>
                        </li>
                        <li class="nav-item flex-fill" role="presentation">
                            <button class="nav-link" id="teacher-tab" data-bs-toggle="tab" data-bs-target="#teacher"
                                type="button" role="tab">
                                <i class="fas fa-chalkboard-teacher me-2"></i>Teacher
                            </button>
                        </li>
                    </ul>

                    <div class="card-body p-4 p-lg-5">
                        {% if messages %}
                        <div class="mb-3">
                            {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show"
                                role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"
                                    aria-label="Close"></button>
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}
                        <div class="tab-content" id="loginTabsContent">

                            <div class="tab-pane fade show active" id="student" role="tabpanel">
                                <h4 class="mb-4 fw-bold text-center">Student Portal</h4>
                                <form action="{% url 'login' %}" method="POST">
                                    {% csrf_token %}
                                    <input type="hidden" name="user_type" value="student">
                                    <div class="mb-3">
                                        <label class="form-label">Email or Username</label>
                                        <input type="text" class="form-control" name="username"
                                            placeholder="Enter student ID" required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Password</label>
                                        <div class="input-group">
                                            <input type="password" class="form-control password-input" name="password"
                                                placeholder="••••••••" required>
                                            <span class="input-group-text bg-white password-toggle"
                                                onclick="togglePassword(this)">
                                                <i class="fas fa-eye"></i>
                                            </span>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 btn-login">Sign In as
                                        Student</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="teacher" role="tabpanel">
                                <h4 class="mb-4 fw-bold text-center">Teacher Portal</h4>
                                <form action="{% url 'login' %}" method="POST">
                                    {% csrf_token %}
                                    <input type="hidden" name="user_type" value="teacher">
                                    <div class="mb-3">
                                        <label class="form-label">Staff Email / Username</label>
                                        <input type="text" class="form-control" name="username"
                                            placeholder="name@institution.edu" required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Password</label>
                                        <div class="input-group">
                                            <input type="password" class="form-control password-input" name="password"
                                                placeholder="••••••••" required>
                                            <span class="input-group-text bg-white password-toggle"
                                                onclick="togglePassword(this)">
                                                <i class="fas fa-eye"></i>
                                            </span>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-dark w-100 btn-login">Sign In as
                                        Teacher</button>
                                </form>
                            </div>

                        </div>
                        <div class="text-center mt-4">
                            <p class="small text-muted">Don't have an account? <a href="{% url 'register' %}"
                                    class="text-decoration-none">Create Account</a></p>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a href="{% url 'landpage' %}" class="btn btn-link btn-sm text-secondary text-decoration-none">
                        <i class="fas fa-arrow-left me-1"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(element) {
            // Find the input field relative to the clicked eye icon
            const passwordInput = element.parentElement.querySelector('.password-input');
            const icon = element.querySelector('i');

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
