{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h2 class="fw-bold">Welcome, Prof. {{ user.username }}</h2>
        <p class="text-muted">Manage your pedagogical pipeline and AI-generated assessments.</p>
    </div>
    <div class="col-md-4 text-md-end">
        <a href="{% url 'teachers:create_course' %}" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>New Course
        </a>
    </div>
</div>

<div class="row g-4 mb-5">
    <div class="col-md-3">
        <div class="card border-0 shadow-sm p-3">
            <small class="text-uppercase fw-bold text-muted">Active Courses</small>
            <h3 class="mb-0">12</h3>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm p-3">
            <small class="text-uppercase fw-bold text-muted">Pending Evaluations</small>
            <h3 class="mb-0 text-warning">45</h3>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm p-3">
            <small class="text-uppercase fw-bold text-muted">Avg. Class Score</small>
            <h3 class="mb-0 text-success">78%</h3>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm p-3">
            <small class="text-uppercase fw-bold text-muted">AI Queries Used</small>
            <h3 class="mb-0 text-primary">1.2k</h3>
        </div>
    </div>
</div>
{% endblock %}
